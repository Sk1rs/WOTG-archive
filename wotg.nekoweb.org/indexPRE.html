<!doctype html>
<html lang="ru">
	<head>
		<script src="security.js"></script>
		<script>
			checkAccess(3);
		</script>
		<meta charset="UTF-8" />
		<title>† WØTG — STAGE 02: SIGNAL_VOID †</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

			:root {
				--acid-green: #00ff41;
				--serum-blue: #00d2ff;
				--error-red: #ff003c;
				--panel-bg: #05050a;
				--border: #111118;
			}

			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				background: #030308; color: var(--serum-blue);
				font-family: 'Fira Code', monospace;
				display: flex; justify-content: center; align-items: center;
				min-height: 100vh; overflow: hidden;
			}

			/* Scanline overlay */
			body::before {
				content: '';
				position: fixed; inset: 0; z-index: 200; pointer-events: none;
				background: repeating-linear-gradient(
					to bottom, transparent 0px, transparent 3px,
					rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
				);
			}

			/* Ambient glow orb */
			.glow-orb {
				position: fixed; width: 600px; height: 600px;
				border-radius: 50%; pointer-events: none;
				background: radial-gradient(circle, rgba(0,180,255,0.04) 0%, transparent 70%);
				top: 50%; left: 50%; transform: translate(-50%,-50%);
				animation: orb-pulse 6s ease-in-out infinite;
			}
			@keyframes orb-pulse {
				0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
				50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
			}

			.synth-rack {
				width: min(560px, 92vw); padding: 28px;
				background: var(--panel-bg);
				border: 1px solid var(--border);
				border-top: 1px solid rgba(0,210,255,0.12);
				box-shadow:
					0 0 60px rgba(0,0,0,0.9),
					0 0 100px rgba(0,50,100,0.08),
					inset 0 1px 0 rgba(0,210,255,0.06);
				position: relative; z-index: 10;
				animation: rack-in 0.6s ease forwards;
				opacity: 0; transform: translateY(16px);
			}
			@keyframes rack-in { to { opacity: 1; transform: translateY(0); } }

			.rack-header {
				border-bottom: 1px solid var(--border);
				padding-bottom: 14px; margin-bottom: 22px;
				display: flex; justify-content: space-between; align-items: center;
			}
			.rack-title {
				font-size: 0.55rem; letter-spacing: 6px; color: #222;
				text-transform: uppercase;
			}
			.rack-id { font-size: 0.5rem; color: #111; letter-spacing: 3px; }

			.display-screen {
				background: #000; border: 1px solid #0a0a12;
				border-left: 2px solid rgba(0,210,255,0.1);
				padding: 16px; margin-bottom: 22px;
				font-size: 0.72rem; line-height: 1.8;
				min-height: 90px; color: var(--acid-green);
				position: relative; overflow: hidden;
			}
			.display-screen::after {
				content: '█';
				animation: blink 1s step-end infinite;
				color: var(--acid-green);
			}
			@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0; } }

			.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

			.knob-group {
				border: 1px solid var(--border); padding: 14px;
				display: flex; flex-direction: column; gap: 10px;
				background: rgba(0,0,0,0.5); position: relative;
			}
			.knob-group::before {
				content: ''; position: absolute;
				top: 0; left: 0; right: 0; height: 1px;
				background: linear-gradient(90deg, transparent, rgba(0,210,255,0.08), transparent);
			}

			.label {
				font-size: 0.52rem; text-transform: uppercase;
				letter-spacing: 3px; color: #1a1a2e;
				display: flex; align-items: center; gap: 8px;
			}

			input[type="text"] {
				background: rgba(0,0,0,0.8); border: none;
				border-bottom: 1px solid #111;
				color: rgba(255,255,255,0.7); padding: 9px 4px;
				font-family: 'Fira Code', monospace; font-size: 0.8rem;
				outline: none; transition: border-color 0.3s, color 0.3s;
				letter-spacing: 2px;
			}
			input[type="text"]::placeholder { color: #1a1a1a; letter-spacing: 1px; }
			input[type="text"]:focus { border-color: rgba(0,210,255,0.3); color: #fff; }

			.status-led {
				width: 6px; height: 6px; border-radius: 50%;
				background: #0a0a12; display: inline-block; flex-shrink: 0;
				transition: background 0.4s, box-shadow 0.4s;
			}
			.led-active { background: var(--acid-green); box-shadow: 0 0 8px var(--acid-green); }
			.led-pending { background: #ff8800; box-shadow: 0 0 8px #ff8800; animation: led-pulse 0.8s ease-in-out infinite; }
			@keyframes led-pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

			.btn-init {
				grid-column: span 2; margin-top: 14px;
				padding: 16px; background: none;
				border: 1px solid rgba(0,210,255,0.15);
				color: rgba(0,210,255,0.5); cursor: pointer;
				font-family: 'Fira Code', monospace;
				font-size: 0.65rem; font-weight: 700;
				letter-spacing: 6px; transition: all 0.4s;
				position: relative; overflow: hidden;
			}
			.btn-init::before {
				content: ''; position: absolute;
				inset: 0; background: rgba(0,210,255,0.04);
				transform: translateX(-100%); transition: transform 0.4s;
			}
			.btn-init:hover::before { transform: translateX(0); }
			.btn-init:hover {
				border-color: rgba(0,210,255,0.5);
				color: var(--serum-blue);
				box-shadow: 0 0 20px rgba(0,210,255,0.08);
			}

			.glitch-overlay {
				position: fixed; inset: 0; background: var(--error-red);
				display: none; z-index: 1000; mix-blend-mode: color-burn;
			}
		</style>
	</head>
	<body>
		<div class="glow-orb"></div>
		<div id="glitch" class="glitch-overlay"></div>

		<div class="synth-rack">
			<div class="rack-header">
				<span class="rack-title">WØTG // SIGNAL_VOID // STAGE_02</span>
				<span class="rack-id">SN: 0x414D42</span>
			</div>

			<div class="display-screen" id="console">
				&gt; WAITING FOR AUTHOR SIGNATURE...
				<br />
				&gt; WARNING: TRANSIENT MISMATCH DETECTED.
				<br />
				&gt; HINT: Установи частоту осциллятора на корень G# Maj.
			</div>

			<div class="controls">
				<div class="knob-group">
					<div class="label">
						<span id="led1" class="status-led"></span>
						OSC_1 FREQ (Hz)
					</div>
					<input
						type="text"
						id="osc-freq"
						placeholder="000.00"
						oninput="markPending('led1')"
					/>
				</div>

				<div class="knob-group">
					<div class="label">
						<span id="led2" class="status-led"></span>
						TRANS_VAL
					</div>
					<input
						type="text"
						id="trans-val"
						placeholder="TYPE_HERE"
						oninput="markPending('led2')"
					/>
				</div>

				<div class="knob-group" style="grid-column: span 2;">
					<div class="label">
						<span id="led3" class="status-led"></span>
						MASTER_KEY
					</div>
					<input
						type="text"
						id="master-key"
						placeholder="FRAGMENT_A + FRAGMENT_B"
						oninput="markPending('led3')"
					/>
				</div>

				<button class="btn-init" onclick="validateSynth()">
					[ INITIATE SEQUENCE ]
				</button>
			</div>
		</div>

		<script>
			const log = document.getElementById('console');

			function markPending(id) {
				const el = document.getElementById(id);
				if (!el.classList.contains('led-active')) {
					el.classList.add('led-pending');
				}
			}

			function typeLog(text) {
				log.innerHTML = '';
				let i = 0;
				const lines = text.split('\n');
				function typeLine(li) {
					if (li >= lines.length) return;
					const span = document.createElement('span');
					log.appendChild(span);
					let ci = 0;
					const int = setInterval(() => {
						span.textContent += lines[li][ci++];
						if (ci >= lines[li].length) {
							clearInterval(int);
							log.appendChild(document.createElement('br'));
							typeLine(li + 1);
						}
					}, 22);
				}
				typeLine(0);
			}

			function validateSynth() {
				const freq  = document.getElementById('osc-freq').value.trim();
				const trans = document.getElementById('trans-val').value.trim().toLowerCase();
				const key   = document.getElementById('master-key').value.trim().toLowerCase();
				let score = 0;

				document.querySelectorAll('.status-led').forEach(l => l.classList.remove('led-pending'));

				if (freq === '415' || freq === '415.30') {
					document.getElementById('led1').classList.add('led-active'); score++;
				}
				if (trans === 'transient' || trans === 'атака') {
					document.getElementById('led2').classList.add('led-active'); score++;
				}
				if (key === 'g#serum' || key === 'serum415') {
					document.getElementById('led3').classList.add('led-active'); score++;
				}

				if (score === 3) {
					typeLog('> ALL SYSTEMS NOMINAL.\n> AUTHOR IDENTITY CONFIRMED.\n> REDIRECTING...');
					setTimeout(() => {
						sessionStorage.setItem('story_progress', 'COMPLETE');
						document.body.style.transition = 'opacity 0.8s';
						document.body.style.opacity = '0';
						setTimeout(() => { window.location.href = 'index.html'; }, 800);
					}, 1800);
				} else {
					document.getElementById('glitch').style.display = 'block';
					typeLog('> CRITICAL ERROR: AUTHOR IDENTITY NOT CONFIRMED.\n> SIGNAL LOST.\n> RETURNING TO ORIGIN...');
					setTimeout(() => { window.location.href = 'index.html'; }, 1200);
				}
			}
		</script>
	</body>
</html>
