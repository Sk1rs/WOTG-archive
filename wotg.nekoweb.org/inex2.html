<!doctype html>
<html lang="ru">
	<head>
		<script>
			if (sessionStorage.getItem('story_progress') !== '1') {
				window.location.href = 'index.html';
			}
		</script>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>† WØTG †</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300&display=swap');

			:root {
				--red: #ff0000;
				--deep-red: #8b0000;
				--gray: #666666;
			}

			body, html {
				margin: 0; padding: 0; background: #000;
				overflow: hidden; font-family: 'Cinzel', serif;
				display: flex; justify-content: center; align-items: center;
				height: 100vh; width: 100vw;
				touch-action: none;
			}

			#renderCanvas {
				position: fixed; inset: 0;
				z-index: 1; pointer-events: none;
			}

			/* Retrowave grid */
			.grid-layer {
				position: fixed; inset: 0;
				background-image:
					linear-gradient(to right, rgba(255,0,0,0.04) 1px, transparent 1px),
					linear-gradient(to bottom, rgba(255,0,0,0.04) 1px, transparent 1px);
				background-size: 30px 30px;
				perspective: 500px;
				transform: rotateX(60deg) scale(3);
				z-index: 2; opacity: 0.25; pointer-events: none;
				animation: grid-scroll 3s linear infinite;
			}
			@keyframes grid-scroll {
				from { background-position: 0 0; }
				to   { background-position: 0 30px; }
			}

			/* Inline grain — no external URL */
			.grain-overlay {
				position: fixed; inset: 0; z-index: 50; pointer-events: none;
				background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
				opacity: 0.09; mix-blend-mode: overlay;
			}

			.vhs-scanlines {
				position: fixed; inset: 0; z-index: 60; pointer-events: none;
				background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%);
				background-size: 100% 4px; opacity: 0.15;
			}

			/* Blood drip from top */
			.drip-container {
				position: fixed; top: 0; left: 0; width: 100%; z-index: 5; pointer-events: none;
			}
			.drip {
				position: absolute; top: 0; width: 1px;
				background: linear-gradient(to bottom, rgba(180,0,0,0.7), transparent);
				animation: drip-fall linear infinite;
			}
			@keyframes drip-fall {
				0%   { height: 0; opacity: 0.8; }
				80%  { opacity: 0.4; }
				100% { height: 40vh; opacity: 0; }
			}

			.ui-wrapper {
				position: relative; z-index: 100;
				display: flex; justify-content: center; align-items: center;
				width: 100%; height: 100%; pointer-events: none;
			}

			.text-stack { position: relative; width: 100%; text-align: center; }

			h1 {
				color: #fff; font-size: 8vw; letter-spacing: 5vw;
				margin: 0; text-transform: uppercase;
				text-shadow: 0 0 20px rgba(255,0,0,0.5), 0 0 60px rgba(255,0,0,0.15);
				white-space: nowrap; padding-left: 5vw;
				animation: title-flicker 8s ease-in-out infinite;
			}
			@keyframes title-flicker {
				0%,100% { opacity: 1; }
				92%      { opacity: 1; }
				93%      { opacity: 0.4; }
				94%      { opacity: 1; }
				97%      { opacity: 1; }
				97.5%    { opacity: 0.6; }
				98%      { opacity: 1; }
			}

			.manifesto {
				position: absolute; color: var(--gray); font-size: 5vw;
				opacity: 0; white-space: nowrap;
				letter-spacing: 3vw; font-weight: 900;
				left: 50%; top: 50%; transform: translate(-50%, -50%);
				mix-blend-mode: exclusion;
				text-transform: uppercase;
				text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
				width: 100%;
				filter: blur(0px);
			}

			/* ── BURN: text burns out like film in a projector ── */
			h1.burning {
				animation: title-flicker 8s ease-in-out infinite, burn-out 4s ease-in forwards;
			}
			@keyframes burn-out {
				0%   { opacity: 1; filter: brightness(1) blur(0px); transform: none; }
				15%  { opacity: 1; filter: brightness(5) blur(1px) saturate(0); transform: none; }
				30%  { opacity: 1; filter: brightness(8) blur(2px) saturate(0); transform: scaleY(1.05); }
				55%  { opacity: 0.7; filter: brightness(4) blur(5px) saturate(0); transform: scaleY(1.12); }
				80%  { opacity: 0.2; filter: brightness(1) blur(10px) saturate(0); transform: scaleY(1.2); }
				100% { opacity: 0;   filter: brightness(0) blur(14px); transform: scaleY(1.25); }
			}

			/* ── EMERGE: text materialises from static ── */
			.manifesto.emerging {
				animation: emerge-in 4s ease-out forwards;
			}
			@keyframes emerge-in {
				0%   { opacity: 0;   filter: blur(18px) brightness(3); transform: translate(-50%, -50%) scale(1.06); }
				20%  { opacity: 0.4; filter: blur(10px) brightness(2); transform: translate(-50%, -50%) scale(1.03); }
				50%  { opacity: 0.7; filter: blur(4px)  brightness(1.3); transform: translate(-50%, -50%) scale(1.01); }
				75%  { opacity: 0.9; filter: blur(1px)  brightness(1.05); transform: translate(-50%, -50%) scale(1); }
				100% { opacity: 1;   filter: blur(0px)  brightness(1); transform: translate(-50%, -50%) scale(1); }
			}

			/* Вertical red lines that appear occasionally */
			.v-glitch {
				position: fixed; top: 0; width: 2px; height: 100%;
				background: rgba(200, 0, 0, 0.15); z-index: 3; pointer-events: none;
				opacity: 0;
			}

			/* NAV */
			.nav-container {
				position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%);
				width: 90%; max-width: 400px;
			}
			.top-nav    { top: 5vh; }
			.bottom-nav { bottom: 5vh; }

			.back-btn {
				font-family: 'Montserrat', sans-serif;
				font-size: 0.65rem; color: rgba(255,255,255,0.5); text-decoration: none;
				letter-spacing: 8px; border: 1px solid rgba(255,255,255,0.07);
				padding: 18px 0; background: rgba(0,0,0,0.85);
				display: block; text-align: center;
				pointer-events: all; border-radius: 1px;
				position: relative; transition: all 0.5s ease;
				-webkit-tap-highlight-color: transparent;
			}
			/* hidden button: invisible by default, revealed on interaction */
			.hidden-btn { opacity: 0; cursor: pointer; transition: opacity 0.4s ease; }
			@media (hover: hover) { .hidden-btn:hover { opacity: 1; } }
			.hidden-btn:active { opacity: 1; }

			/* hint arrow — slowly pulses above the hidden button zone */
			.hint-arrow {
				position: fixed;
				top: 2.5vh;
				left: 50%;
				transform: translateX(-50%);
				z-index: 1001;
				pointer-events: none;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 4px;
				animation: hint-breathe 3s ease-in-out infinite;
			}
			.hint-arrow span {
				font-family: 'Montserrat', sans-serif;
				font-size: 0.55rem;
				letter-spacing: 5px;
				color: rgba(180, 0, 0, 0.55);
				text-transform: uppercase;
			}
			.hint-arrow svg {
				opacity: 0.5;
			}
			@keyframes hint-breathe {
				0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0); }
				50%       { opacity: 1;   transform: translateX(-50%) translateY(-4px); }
			}

			.back-btn::before, .back-btn::after {
				content: attr(data-text);
				position: absolute; inset: 0;
				display: flex; justify-content: center; align-items: center;
				opacity: 0;
				transition: transform 0.4s cubic-bezier(0.165,0.84,0.44,1), opacity 0.4s ease;
				pointer-events: none;
			}
			.back-btn:hover, .back-btn:active {
				border-color: var(--deep-red);
				background: rgba(10,0,0,1);
				color: rgba(255,255,255,0.1);
			}
			.back-btn:hover::before, .back-btn:active::before {
				opacity: 0.9; color: var(--deep-red);
				transform: translate(-5px, 0);
				text-shadow: 0 0 8px var(--deep-red);
			}
			.back-btn:hover::after, .back-btn:active::after {
				opacity: 0.7; color: #555;
				transform: translate(5px, 0);
				mix-blend-mode: screen;
			}

			@media (min-width: 768px) {
				h1 { font-size: 4.5rem; letter-spacing: 30px; }
				.manifesto { font-size: 2.8rem; letter-spacing: 20px; }
				.back-btn { font-size: 0.8rem; letter-spacing: 12px; padding: 22px 70px; }
				.nav-container { width: auto; }
			}
		</style>
	</head>
	<body>
		<!-- Blood drips -->
		<div class="drip-container" id="drips"></div>

		<!-- Hint arrow pointing to hidden button -->
		<div class="hint-arrow">
			<span>здесь что-то есть</span>
			<svg
				width="12"
				height="8"
				viewBox="0 0 12 8"
				fill="none"
				xmlns="http://www.w3.org/2000/svg"
			>
				<path d="M6 0L0 8H12L6 0Z" fill="rgba(180,0,0,0.6)" />
			</svg>
		</div>

		<div class="grid-layer" id="grid"></div>
		<canvas id="renderCanvas"></canvas>
		<div class="grain-overlay"></div>
		<div class="vhs-scanlines"></div>

		<!-- Vertical glitch lines -->
		<div class="v-glitch" id="vg1" style="left:15%"></div>
		<div class="v-glitch" id="vg2" style="left:72%"></div>

		<div class="nav-container top-nav">
			<a
				href="javascript:void(0)"
				class="back-btn hidden-btn"
				data-text="Я ГОТОВ"
				onclick="sessionStorage.setItem('story_progress','2'); goNext();"
			>
				Я ГОТОВ
			</a>
		</div>

		<div class="ui-wrapper">
			<div class="text-stack">
				<h1 id="primary">СКОРО БУДЕТ</h1>
				<div id="secondary" class="manifesto">БОГ НЕ БОИТСЯ СМЕРТИ</div>
			</div>
		</div>

		<div class="nav-container bottom-nav">
			<a href="index.html" class="back-btn" data-text="Я НЕ ГОТОВ">
				Я НЕ ГОТОВ
			</a>
		</div>

		<script>
			function goNext() {
				document.body.style.transition = 'opacity 0.7s';
				document.body.style.opacity = '0';
				setTimeout(() => { window.location.href = 'index3.html'; }, 700);
			}

			const canvas = document.getElementById('renderCanvas');
			const ctx = canvas.getContext('2d');
			const primary = document.getElementById('primary');
			const secondary = document.getElementById('secondary');
			const starImg = new Image(); starImg.src = 'star.png';

			let width, height, level = 0;

			function resize() { width = canvas.width = innerWidth; height = canvas.height = innerHeight; }
			window.addEventListener('resize', resize); resize();

			// Random vertical glitch flashes
			function flashVGlitch() {
				const lines = [document.getElementById('vg1'), document.getElementById('vg2')];
				lines.forEach(l => {
					if (Math.random() > 0.7) {
						l.style.opacity = String(Math.random() * 0.4);
						l.style.width = Math.random() > 0.5 ? '2px' : '1px';
					} else { l.style.opacity = '0'; }
				});
				setTimeout(flashVGlitch, 800 + Math.random() * 2000);
			}
			flashVGlitch();

			// Blood drips
			function spawnDrip() {
				const el = document.createElement('div');
				el.className = 'drip';
				el.style.left = Math.random() * 100 + 'vw';
				const dur = 4 + Math.random() * 6;
				el.style.animation = `drip-fall ${dur}s linear forwards`;
				document.getElementById('drips').appendChild(el);
				setTimeout(() => el.remove(), dur * 1000);
				setTimeout(spawnDrip, 1500 + Math.random() * 4000);
			}
			spawnDrip();

			function render() {
				level += 0.012;
				ctx.fillStyle = `rgba(0,0,0,${Math.random() > 0.92 ? 0.35 : 0.18})`;
				ctx.fillRect(0, 0, width, height);

				ctx.save();
				ctx.translate(width / 2, height / 2);
				ctx.strokeStyle = `rgba(255,0,0,0.06)`;
				ctx.lineWidth = 1.5;
				const count = width < 600 ? 8 : 12;
				for (let i = 0; i < count; i++) {
					ctx.rotate(level * 0.08 + i);
					ctx.strokeRect(-width, -1, width * 2, 2);
					ctx.scale(0.88, 0.88);
				}
				ctx.restore();

				if (starImg.complete) {
					ctx.save();
					ctx.translate(width / 2, height / 2);
					ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = 0.04;
					ctx.rotate(-level * 0.18);
					const s = (width < 600 ? 0.65 : 1.1) + Math.sin(level) * 0.04;
					ctx.scale(s, s);
					ctx.drawImage(starImg, -450, -450, 900, 900);
					ctx.restore();
				}

			let burnTriggered = false;
			let emergeTriggered = false;

			if (level > 2 && !burnTriggered) {
				burnTriggered = true;
				primary.classList.add('burning');
				// after animation ends, hide completely
				setTimeout(() => { primary.style.opacity = '0'; primary.style.animation = 'none'; }, 4200);
			}

			if (level > 5 && !emergeTriggered) {
				emergeTriggered = true;
				secondary.classList.add('emerging');
			}
				requestAnimationFrame(render);
			}
			render();
		</script>
	</body>
</html>
